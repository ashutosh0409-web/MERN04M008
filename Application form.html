<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
</head>
<body>

<h2>Application Form</h2>

<form>
    <table cellpadding="6">
        <tr>
            <td>First Name:</td>
            <td><input type="text"></td>
            <td>Last Name:</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Date of birth:</td>
            <td><input type="date"></td>
            <td>Age:</td>
            <td><input type="number"></td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <select>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </td>
            <td>Email Address:</td>
            <td><input type="email" placeholder="Enter email address"></td>
        </tr>

        <tr>
            <td>Positions Available:</td>
            <td colspan="3">
                <input type="radio" name="pos"> Junior Developer
                <input type="radio" name="pos"> Mid-level Developer
                <input type="radio" name="pos"> Senior Developer
            </td>
        </tr>

        <tr>
            <td>Programming Languages:</td>
            <td colspan="3">
                <input type="checkbox"> Java
                <input type="checkbox"> JavaScript
                <input type="checkbox"> Python
            </td>
        </tr>

        <tr>
            <td>Password:</td>
            <td><input type="password"></td>
            <td>Confirm Password:</td>
            <td><input type="password"></td>
        </tr>

        <tr>
            <td colspan="4" align="left">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
